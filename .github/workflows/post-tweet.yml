name: post-tweet

on:
  schedule:
    # Every 2 hours between 9am and 1am ET (anchored to EDT, UTC-4).
    # UTC hours: 13, 15, 17, 19, 21, 23, 1, 3, 5
    # In ET (EDT): 9am, 11am, 1pm, 3pm, 5pm, 7pm, 9pm, 11pm, 1am
    # During EST (winter), posts will land one hour later in ET (10am - 2am).
    - cron: "0 13,15,17,19,21,23,1,3,5 * * *"
  workflow_dispatch:  # also lets you trigger it manually from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic tweepy

      - name: Run the bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python tweet_bot.py
